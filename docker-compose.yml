# Infrastructure only — Ollama and Broodlink Rust services run natively.
# Usage: docker compose up -d

services:
  # ── Databases ──────────────────────────────────────────────────

  dolt:
    image: dolthub/dolt-sql-server:latest
    ports:
      - "3307:3306"
    volumes:
      - dolt-data:/var/lib/dolt
    environment:
      DOLT_ROOT_DIR: /var/lib/dolt
    command:
      [
        "dolt",
        "sql-server",
        "--host=0.0.0.0",
        "--port=3306",
        "--user=root",
        "--password=${BROODLINK_DOLT_PASSWORD:?Set BROODLINK_DOLT_PASSWORD}",
      ]
    healthcheck:
      test: ["CMD", "dolt", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: broodlink_hot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${BROODLINK_POSTGRES_PASSWORD:?Set BROODLINK_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Messaging ──────────────────────────────────────────────────

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    command: ["--jetstream", "--store_dir=/data"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Vector store ───────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Observability ──────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  dolt-data:
  pg-data:
  nats-data:
  qdrant-data:
