name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo (Unix)
        if: runner.os != 'Windows'
        run: |
          HUGO_VERSION="0.155.3"
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   HUGO_ARCH="linux-amd64" ;;
            Linux-ARM64) HUGO_ARCH="linux-arm64" ;;
            macOS-*)     HUGO_ARCH="darwin-universal" ;;
          esac
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_${HUGO_ARCH}.tar.gz" | tar xz -C /usr/local/bin hugo

      - name: Install Hugo (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "0.155.3"
          $url = "https://github.com/gohugoio/hugo/releases/download/v$v/hugo_extended_${v}_windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile hugo.zip
          Expand-Archive hugo.zip -DestinationPath "$env:RUNNER_TEMP\hugo"
          echo "$env:RUNNER_TEMP\hugo" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Generate static assets
        run: hugo --minify --source status-site

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation for Linux ARM
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Build
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --workspace --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-D warnings"

      - name: Build (cross)
        if: matrix.cross
        run: cross build --workspace --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-D warnings"

      # Package binaries
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="broodlink-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGING"

          BINS="broodlink beads-bridge coordinator heartbeat embedding-worker status-api mcp-server a2a-gateway"
          for bin in $BINS; do
            cp "target/${{ matrix.target }}/release/$bin" "$STAGING/"
          done

          cp LICENSE README.md "$STAGING/" 2>/dev/null || true
          tar czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $STAGING = "broodlink-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING

          $BINS = @("broodlink", "beads-bridge", "coordinator", "heartbeat", "embedding-worker", "status-api", "mcp-server", "a2a-gateway")
          foreach ($bin in $BINS) {
            Copy-Item "target/${{ matrix.target }}/release/$bin.exe" "$STAGING/"
          }

          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$STAGING/" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$STAGING/" }
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"
          echo "ASSET=$STAGING.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Generate SHA256
      - name: Checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ env.ASSET }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.ASSET }}" | Out-File -FilePath "${{ env.ASSET }}.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
