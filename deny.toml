[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "AGPL-3.0-or-later",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CDLA-Permissive-2.0",
  "OFL-1.1",
  "OpenSSL",
  "CC0-1.0",
]

[advisories]
ignore = [
  # rustls-pemfile unmaintained — transitive dep from async-nats, no upgrade path yet
  "RUSTSEC-2025-0134",
  # rsa timing sidechannel — transitive dep from sqlx-mysql, no safe upgrade available
  "RUSTSEC-2023-0071",
  # proc-macro-error unmaintained — transitive dep from rust-embed, no upgrade path yet
  "RUSTSEC-2024-0370",
  # AWS-LC advisories — transitive deps from rustls/tokio-rustls, awaiting upstream patch
  "RUSTSEC-2026-0044",
  "RUSTSEC-2026-0045",
  "RUSTSEC-2026-0046",
  "RUSTSEC-2026-0047",
  "RUSTSEC-2026-0048",
  "RUSTSEC-2026-0049",
  # rand unsoundness with custom logger — not applicable (no custom logger)
  "RUSTSEC-2026-0097",
  # rustls-webpki URI/wildcard name constraint issues — transitive deps from reqwest 0.11,
  # async-nats 0.35, and rustls 0.23; pinned by upstream, low exploitability (requires
  # misissuance after signature verification). Run `cargo update -p rustls-webpki` to fix
  # the 0.103.x version; 0.101.x and 0.102.x await upstream upgrades.
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
]

[bans]
deny = [
  { name = "openssl-sys" },
  { name = "native-tls" },
]
