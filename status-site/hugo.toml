baseURL          = "http://localhost:1313"
languageCode     = "en-us"
title            = "Broodlink Operations"
theme            = "broodlink-status"

[params]
  statusApiUrl    = "SELF"  # "SELF" = same-origin (binary mode). Override for hugo dev server.
  statusApiKey    = "dev-api-key"  # must match BROODLINK_STATUS_API_KEY
  refreshInterval = 10000
  company         = "Broodlink"
  version         = "0.12.2"

[build]
  [build.environment]
    BROODLINK_ENV = "development"
