baseURL          = "http://localhost:1313"
languageCode     = "en-us"
title            = "Broodlink Operations"
theme            = "broodlink-status"

[params]
  statusApiUrl    = "SELF"  # "SELF" = same-origin proxy (binary mode). Override with real URL for hugo dev server.
  statusApiKey    = ""      # not needed when using binary proxy
  refreshInterval = 10000
  company         = "Broodlink"
  version         = "0.12.2"

[build]
  [build.environment]
    BROODLINK_ENV = "development"
