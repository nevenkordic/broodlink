baseURL          = "http://localhost:1313"
languageCode     = "en-us"
title            = "Broodlink Operations"
theme            = "broodlink-status"

[params]
  statusApiUrl    = "SELF"  # "SELF" = same-origin (binary mode). Override for hugo dev server.
  # API key is injected at runtime by dashboard.rs — never bake secrets into static HTML.
  # statusApiKey = ""
  refreshInterval = 10000
  company         = "Broodlink"
  version         = "0.12.5"

[build]
  [build.environment]
    BROODLINK_ENV = "development"
